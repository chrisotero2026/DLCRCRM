<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a0f1e"/>
  
  <!-- Hexagon shield -->
  <polygon points="256,60 420,155 420,357 256,452 92,357 92,155" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.9"/>
  
  <!-- Inner glow ring -->
  <polygon points="256,90 395,168 395,344 256,422 117,344 117,168" fill="rgba(74,133,245,0.08)" stroke="rgba(168,85,247,0.3)" stroke-width="2"/>
  
  <!-- Robot head -->
  <rect x="176" y="168" width="160" height="140" rx="24" fill="url(#grad2)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Eyes -->
  <rect x="206" y="204" width="40" height="32" rx="8" fill="#0a0f1e"/>
  <rect x="266" y="204" width="40" height="32" rx="8" fill="#0a0f1e"/>
  <rect x="214" y="210" width="24" height="20" rx="5" fill="#4a85f5"/>
  <rect x="274" y="210" width="24" height="20" rx="5" fill="#4a85f5"/>
  <!-- Eye glow -->
  <rect x="218" y="214" width="10" height="8" rx="3" fill="#7ab8ff" opacity="0.8"/>
  <rect x="278" y="214" width="10" height="8" rx="3" fill="#7ab8ff" opacity="0.8"/>

  <!-- Mouth -->
  <rect x="210" y="260" width="92" height="16" rx="8" fill="#0a0f1e"/>
  <rect x="218" y="264" width="16" height="8" rx="4" fill="#f0a500"/>
  <rect x="240" y="264" width="16" height="8" rx="4" fill="#f0a500" opacity="0.7"/>
  <rect x="262" y="264" width="16" height="8" rx="4" fill="#f0a500" opacity="0.4"/>
  <rect x="284" y="264" width="8" height="8" rx="4" fill="#f0a500" opacity="0.2"/>

  <!-- Antennas -->
  <line x1="226" y1="168" x2="226" y2="138" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="226" cy="130" r="10" fill="#f0a500"/>
  <circle cx="226" cy="130" r="5" fill="#fff"/>
  
  <line x1="286" y1="168" x2="286" y2="138" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="286" cy="130" r="10" fill="#a855f7"/>
  <circle cx="286" cy="130" r="5" fill="#fff"/>

  <!-- Neck -->
  <rect x="236" y="308" width="40" height="20" rx="6" fill="url(#grad2)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Body -->
  <rect x="186" y="328" width="140" height="90" rx="18" fill="url(#grad3)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Chest detail -->
  <rect x="206" y="348" width="50" height="30" rx="8" fill="rgba(74,133,245,0.3)" stroke="rgba(74,133,245,0.5)" stroke-width="1"/>
  <rect x="262" y="348" width="50" height="30" rx="8" fill="rgba(240,165,0,0.15)" stroke="rgba(240,165,0,0.4)" stroke-width="1"/>
  
  <!-- Chest icons -->
  <circle cx="231" cy="363" r="8" fill="#4a85f5" opacity="0.8"/>
  <circle cx="231" cy="363" r="4" fill="#fff" opacity="0.9"/>
  <rect x="270" y="355" width="24" height="16" rx="4" fill="#f0a500" opacity="0.6"/>

  <!-- DLCR text at bottom -->
  <text x="256" y="450" font-family="Arial,sans-serif" font-weight="800" font-size="28" fill="#f0a500" text-anchor="middle" letter-spacing="4">DLCR</text>
  <text x="256" y="474" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">JARVIS AI</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a85f5"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#2d1f5e"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0d1829"/>
    </linearGradient>
  </defs>
</svg>
